<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c1810">
    <title>Through the Ages</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK (Firestore only — auth handled by Cloudflare Access) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="header">
            <div class="era-info">
                <div class="era-name" id="era-name">🪨 Stone Age</div>
                <div class="era-description" id="era-description">Survival through discovery</div>
            </div>
        </header>

        <!-- Tab Panels -->
        <div class="panels">
            <!-- Main Panel -->
            <div class="tab-panel active" id="panel-main">
                <div class="resource-display">
                    <div class="knowledge-label">Knowledge</div>
                    <div class="knowledge-amount" id="knowledge-amount">0</div>
                    <div class="knowledge-rate" id="knowledge-per-sec">0/sec from scholars</div>
                    <div class="population-row">
                        <span>👥</span>
                        <span>Population: <span id="population-amount">0</span></span>
                    </div>
                </div>

                <div class="discover-area">
                    <button class="discover-btn" id="discover-btn">
                        <span class="click-label">DISCOVER</span>
                        <span class="click-value" id="knowledge-per-click">+1/click</span>
                    </button>
                </div>

                <div class="auto-gen-info" id="auto-gen-info"></div>

                <div class="era-progress">
                    <div class="era-progress-label">
                        <span>Era Progress</span>
                        <span id="era-progress-text">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="era-progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <button class="advance-era-btn" id="advance-era-btn">
                    <span id="advance-era-text">Advance to ⚔️ Bronze Age</span>
                </button>
            </div>

            <!-- Inventions Panel -->
            <div class="tab-panel" id="panel-inventions">
                <div class="upgrade-list" id="upgrade-list"></div>
            </div>

            <!-- Legacy Panel -->
            <div class="tab-panel" id="panel-legacy">
                <div id="legacy-content"></div>
            </div>

            <!-- Settings Panel -->
            <div class="tab-panel" id="panel-settings">
                <div class="settings-section">
                    <h3>Account</h3>
                    <div id="user-info" class="user-info">
                        <span class="user-offline">Playing offline</span>
                    </div>
                    <div class="settings-buttons" style="margin-top: 8px;">
                        <button class="settings-btn" id="sign-out-btn" style="display:none;">🚪 Sign Out</button>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Statistics</h3>
                    <div id="stats-content"></div>
                </div>
                <div class="settings-section">
                    <h3>Player Name</h3>
                    <div class="name-input-row">
                        <input type="text" id="display-name-input" class="name-input" placeholder="Anonymous" maxlength="20">
                        <button class="settings-btn" id="set-name-btn">Set</button>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Leaderboard</h3>
                    <div id="leaderboard-content" class="leaderboard-container">
                        <button class="settings-btn" id="refresh-leaderboard-btn">🏆 Load Leaderboard</button>
                        <div id="leaderboard-list"></div>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Data</h3>
                    <div class="settings-buttons">
                        <button class="settings-btn" id="save-btn">💾 Save Game</button>
                        <button class="settings-btn" id="cloud-save-btn" style="display:none;">☁️ Save to Cloud</button>
                        <button class="settings-btn" id="export-btn">📋 Export Save</button>
                        <button class="settings-btn" id="import-btn">📥 Import Save</button>
                        <button class="settings-btn danger" id="reset-btn">🗑️ Reset All Progress</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="tab-btn active" data-tab="main" id="tab-main">
                <span class="tab-icon">🏠</span>
                Main
            </button>
            <button class="tab-btn" data-tab="inventions" id="tab-inventions">
                <span class="tab-icon">📜</span>
                Inventions
            </button>
            <button class="tab-btn" data-tab="legacy">
                <span class="tab-icon">🏛️</span>
                Legacy
                <span class="tab-badge" id="legacy-badge"></span>
            </button>
            <button class="tab-btn" data-tab="settings">
                <span class="tab-icon">⚙️</span>
                Settings
            </button>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Tutorial Overlay -->
    <div class="tutorial-overlay" id="tutorial-overlay">
        <div class="tutorial-bubble">
            <div id="tutorial-bubble"></div>
            <button class="tutorial-dismiss" id="tutorial-dismiss">Skip Tutorial</button>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="js/game-state.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/prestige.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/firebase-sync.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/tutorial.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
